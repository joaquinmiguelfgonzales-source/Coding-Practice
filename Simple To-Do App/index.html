<!DOCTYPE html>
<html>
    <head>
        <title>My Page</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <h2>
            Hello!<br>
            This is a simple to-do list
        </h2>
        <label for="taskInput" class="taskManagerLabel">To Do list Task Manager</label><br>
        <input type="text" id="taskInput"/>
        <button id="addBtn">Add</button>
        <div class="board">
            <div class="column">
                <h3 class="taskBoardLabel">Active Tasks</h3>
                <ul id="activeList"></ul>
            </div>
            <div class="column">
                <h3 class="taskBoardLabel">Completed Tasks</h3>
                <ul id="completedList"></ul>
            </div>
        </div>
        
    </body>
</html>
<script>
    const input = document.getElementById("taskInput");
    const button = document.getElementById("addBtn");
    const activeList = document.getElementById("activeList");
    const completedList = document.getElementById("completedList");

    input.addEventListener("keypress", (e) => {
        if (e.key == "Enter") {
            button.click();
        }
    });

    button.onclick = () => {
        if (input.value.trim() == "") return;
        const newTask = input.value.trim();

        const allItemsDupeCheck = [
            ...Array.from(activeList.children),
            ...Array.from(completedList.children)
        ];
        const dupeTrue =allItemsDupeCheck.find(item => {
            return item.querySelector("span").innerText.toLowerCase() == newTask.toLowerCase();
        });

        if (dupeTrue){
            dupeTrue.scrollIntoView({ behavior: "smooth", block: "center" });
            setTimeout(() => {
                dupeTrue.classList.add("shake");

                dupeTrue.addEventListener("animationend", () => {
                    dupeTrue.classList.remove("shake");
                }, { once: true });
            }, 300);
            return;
        }
        const li = document.createElement("li");
        li.classList.add("taskManager");

        //span for text
        const span = document.createElement("span");
        span.innerText = input.value;

        const deleteBtn = document.createElement("button");
        deleteBtn.innerText = "X";
        deleteBtn.classList.add("deleteBtn");

        deleteBtn.onclick = (e) => {
            e.stopPropagation(); // prevents triggering li click
            li.remove();
        };

        li.appendChild(span);
        li.appendChild(deleteBtn);

        li.onclick = () => {
           // const first = li.getBoundingClientRect(); // get first position
            const items = [
                ...Array.from(activeList.children),
                ...Array.from(completedList.children)
            ];

            // all items first positions
            const firstPositions=new Map();
            items.forEach(item => {
                firstPositions.set(item, item.getBoundingClientRect());
            });

            if(li.classList.contains("taskManager")){
                li.classList.replace("taskManager", "taskManagerCompleted");
                completedList.appendChild(li);
            }else if(li.classList.contains("taskManagerCompleted")){
                li.classList.replace("taskManagerCompleted", "taskManager");
                activeList.appendChild(li);   
            }


            const newItems = [
                ...Array.from(activeList.children),
                ...Array.from(completedList.children)
            ];

            newItems.forEach(item => {
                const first = firstPositions.get(item);
                if (!first) return; 

                const last = item.getBoundingClientRect();

                const dx = first.left - last.left;
                const dy = first.top - last.top;

                if (dx !== 0 || dy !== 0) {
                    item.style.transition = "none";
                    item.style.transform = `translate(${dx}px, ${dy}px)`;

                    // force reflow
                    item.getBoundingClientRect();

                    requestAnimationFrame(() => {
                        item.style.transition = "transform 0.6s ease";
                        item.style.transform = "";
                    });

                    item.addEventListener("transitionend", () => {
                        item.style.transition = "";
                    }, { once: true });
                        }
            });

        };
        activeList.appendChild(li);
        input.value = "";
    }

</script>
